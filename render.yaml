# Render.com blueprint — one-click deploy of the StructAuto web app.
# When a Render "Web Service" is connected to this repo, Render reads this file
# and provisions the service with the settings below.
#
# After connecting the repo, set these env vars in the Render dashboard
# (marked sync: false below = must be set manually, never committed):
#   FLASK_SECRET_KEY      = long random string
#   ADMIN_PASSWORD        = strong password for the admin user
#   DATABASE_URL          = postgresql://... (from Neon)
#   SCRIPTS_DIR           = /opt/render/project/src   (repo root on Render)

services:
  - type: web
    name: structauto
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 4 -b 0.0.0.0:$PORT --timeout 300 app:app
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: FORCE_HTTPS
        value: "true"
      - key: SESSION_HOURS
        value: "8"
      - key: JOB_RETENTION_HOURS
        value: "24"
      - key: LOGIN_RATE_LIMIT
        value: "5 per minute"
      - key: MAX_FAILED_LOGINS
        value: "5"
      - key: LOCKOUT_MINUTES
        value: "15"
      - key: ADMIN_USERNAME
        value: admin
      - key: SCRIPTS_DIR
        value: /opt/render/project/src
      - key: FLASK_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
